
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMPETITIONS</title>
<style>
body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #ff4b2b;
}

.outlined {
    position: relative;
    display: inline-block;
    font-family: Rockforge, sans-serif;
    font-size: 12vw;
    font-weight: 800;
    letter-spacing: 10px;
    line-height: 0.8;
    margin: 0;
    transform: scaleY(0.9);
}

.outlined .border {
    position: absolute;
    inset: 0;
    color: transparent;
    -webkit-text-stroke: 18px #5a00ff;
    -moz-text-stroke: 18px #5a00ff;
    filter: drop-shadow(0 6px 0 #3a0099);
    z-index: 1;
    user-select: text;
}

.outlined .fill {
    position: relative;
    color: #ffcc00;
    text-shadow: 0 3px 0 #d18f00, 0 -1px 0 rgba(255,255,255,0.3);
    z-index: 2;
    user-select: text;
}
</style>
</head>
<body>

<h1 class="outlined">
  <span class="border">COMPETITIONS</span>
  <span class="fill">COMPETITIONS</span>
</h1>

</body>
</html>
